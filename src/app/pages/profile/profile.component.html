<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
      <div class="d-flex align-items-center gap-3 mb-5">
        <button class="back-btn" routerLink="/">
          <span>← Back to Home</span>
        </button>
      </div>

      <div class="glass-card p-5 mb-4">
        <div class="d-flex align-items-center gap-4 mb-5">
          <div class="avatar-wrapper">
            <div class="avatar bg-gradient-primary">
              <span class="fs-1 fw-bold text-white">{{
                user()?.name?.charAt(0)?.toUpperCase()
              }}</span>
            </div>
          </div>
          <div>
            <h2 class="fw-bold mb-1">{{ user()?.name }}</h2>
            <p class="text-muted mb-0">{{ user()?.email }}</p>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-md-6">
            <div class="stat-card glass-card p-4">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon">❤️</div>
                <div>
                  <p class="text-muted mb-1">Favorites</p>
                  <h3 class="fw-bold mb-0">0</h3>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="stat-card glass-card p-4">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon">🛒</div>
                <div>
                  <p class="text-muted mb-1">Orders</p>
                  <h3 class="fw-bold mb-0">0</h3>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div class="glass-card p-5 mb-4">
        <h3 class="fw-bold mb-4">Settings</h3>

        <div
          class="setting-item d-flex justify-content-between align-items-center py-4 border-bottom"
        >
          <div class="d-flex align-items-center gap-3">
            <span class="setting-icon">🌗</span>
            <div>
              <h5 class="fw-semibold mb-1">Theme</h5>
              <p class="text-muted mb-0 small">Switch between light and dark mode</p>
            </div>
          </div>
          <div class="theme-toggle-options d-flex gap-2">
            <button
              class="theme-option btn"
              [class.active]="!themeService.isDark()"
              (click)="themeService.setTheme('light')"
            >
              Light
            </button>
            <button
              class="theme-option btn"
              [class.active]="themeService.isDark()"
              (click)="themeService.setTheme('dark')"
            >
              Dark
            </button>
          </div>
        </div>

        <div class="setting-item d-flex justify-content-between align-items-center py-4">
          <div class="d-flex align-items-center gap-3">
            <span class="setting-icon">📦</span>
            <div>
              <h5 class="fw-semibold mb-1">Order History</h5>
              <p class="text-muted mb-0 small">View your past orders</p>
            </div>
          </div>
          <button class="btn btn-outline" routerLink="/order-history">View Orders</button>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="glass-card p-5">
        <h3 class="fw-bold mb-4 text-danger">Danger Zone</h3>
        <div class="d-flex gap-3">
          <button class="btn btn-outline-danger px-5 py-3" (click)="logout()">Log Out</button>
        </div>
      </div>
    </div>
  </div>
</div>
