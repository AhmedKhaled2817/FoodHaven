<div class="container">
  <h1 class="fw-bold mb-5">❤️ My Favorites</h1>

  <div *ngIf="favorites().length > 0" class="row g-4">
    <div class="col-xl-3 col-lg-4 col-md-6 col-sm-6 col-12" *ngFor="let meal of favorites()">
      <app-meal-card [meal]="meal"></app-meal-card>
    </div>
  </div>

  <div *ngIf="favorites().length === 0" class="glass-card p-5 text-center">
    <h3 class="mb-3">No favorites yet!</h3>
    <p class="text-muted mb-4">Start exploring and add your favorite meals!</p>
    <a routerLink="/" class="btn btn-primary">Explore Menu</a>
  </div>
</div>
