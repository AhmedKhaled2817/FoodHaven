<nav class="navbar navbar-expand-lg fixed-top glass-navbar">
  <div class="container">

      <span class="logo">🍜</span>
      <span class="brand">FoodHaven</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-center gap-3">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">{{ t('nav.home') }}</a>

          <a class="nav-link" routerLink="/favorites">

          </a>

        <li class="nav-item" *ngIf="isLoggedIn()">
          <a class="nav-link" routerLink="/enterprise">{{ t('nav.enterprise') }}</a>

          </a>

        <li class="nav-item">
          <button class="btn-language" (click)="toggleLanguage()">{{ t('nav.language') }}</button>

          <a class="btn-signup" routerLink="/register">{{ t('nav.signUp') }}</a>
