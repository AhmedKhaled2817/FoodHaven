<section class="modern-featured-section py-5">
  <div class="container">
    <div class="row align-items-end mb-5" data-aos="fade-up">
      <div class="col-lg-8">
        <span class="section-label">{{ t('featured.sectionLabel') }}</span>
        <h2 class="section-title">{{ t('featured.sectionTitle') }}</h2>
      </div>
      <div class="col-lg-4 text-lg-end mt-4 mt-lg-0">
        <a class="btn btn-outline-primary btn-lg" routerLink="/register">{{ t('featured.joinToday') }}</a>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6 col-xl-3" *ngFor="let item of features" data-aos="fade-up">
        <div class="feature-card glass-card p-4 h-100">
          <div class="feature-header d-flex align-items-center justify-content-between mb-3">
            <div class="feature-icon">{{ item.icon }}</div>
            <span class="badge bg-primary text-white feature-badge">{{ item.badge }}</span>
          </div>
          <h3 class="feature-title">{{ item.title }}</h3>
          <p class="feature-description text-muted">{{ item.description }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
